<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-hidden="true">
  <!-- A medieval-style four-lobed fleuron / quatrefoil with vine curls.
       Inspired by aldus leaves and rubricated paragraph marks in 13th-15th
       century manuscripts. -->
  <g fill="#5e2422" stroke="#5e2422" stroke-width="0.4" stroke-linejoin="round">
    <!-- Top lobe (heart-shaped leaf) -->
    <path d="M 40 8
             C 36 12, 33 17, 36 22
             Q 38 25, 40 25
             Q 42 25, 44 22
             C 47 17, 44 12, 40 8 Z"/>
    <!-- Bottom lobe (mirror) -->
    <path d="M 40 72
             C 36 68, 33 63, 36 58
             Q 38 55, 40 55
             Q 42 55, 44 58
             C 47 63, 44 68, 40 72 Z"/>
    <!-- Left lobe -->
    <path d="M 8 40
             C 12 36, 17 33, 22 36
             Q 25 38, 25 40
             Q 25 42, 22 44
             C 17 47, 12 44, 8 40 Z"/>
    <!-- Right lobe -->
    <path d="M 72 40
             C 68 36, 63 33, 58 36
             Q 55 38, 55 40
             Q 55 42, 58 44
             C 63 47, 68 44, 72 40 Z"/>
    <!-- Diagonal vine curls (NW, NE, SW, SE) -->
    <path d="M 18 18 Q 22 22, 28 26 Q 24 22, 18 18 Z"/>
    <path d="M 62 18 Q 58 22, 52 26 Q 56 22, 62 18 Z"/>
    <path d="M 18 62 Q 22 58, 28 54 Q 24 58, 18 62 Z"/>
    <path d="M 62 62 Q 58 58, 52 54 Q 56 58, 62 62 Z"/>
  </g>
  <!-- Central gilt boss -->
  <circle cx="40" cy="40" r="4.5" fill="#5e2422"/>
  <circle cx="40" cy="40" r="2.2" fill="#e6c66b"/>
</svg>
